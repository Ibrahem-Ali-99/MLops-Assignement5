name: MLOps Pipeline

on:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install DVC
        run: pip install dvc

      - name: Pull data with DVC
        run: dvc pull || echo "No DVC remote, using committed data"

      - name: Start local MLflow server
        run: |
          mlflow server \
            --host 127.0.0.1 \
            --port 5000 \
            --backend-store-uri sqlite:///mlflow.db \
            --default-artifact-root ./mlartifacts &
          sleep 5

      - name: Train model and log to MLflow
        env:
          MLFLOW_TRACKING_URI: http://127.0.0.1:5000
        run: python train.py

      - name: Upload model_info.txt
        uses: actions/upload-artifact@v4
        with:
          name: model-info
          path: model_info.txt

      - name: Upload MLflow database
        uses: actions/upload-artifact@v4
        with:
          name: mlflow-db
          path: mlflow.db

  deploy:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download model_info.txt
        uses: actions/download-artifact@v4
        with:
          name: model-info

      - name: Download MLflow database
        uses: actions/download-artifact@v4
        with:
          name: mlflow-db

      - name: Start local MLflow server
        run: |
          mlflow server \
            --host 127.0.0.1 \
            --port 5000 \
            --backend-store-uri sqlite:///mlflow.db \
            --default-artifact-root ./mlartifacts &
          sleep 5

      - name: Check accuracy threshold
        env:
          MLFLOW_TRACKING_URI: http://127.0.0.1:5000
        run: python check_threshold.py

      - name: Mock Docker Build
        run: |
          echo "Building Docker image for Run ID: $(cat model_info.txt)"